<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIM Portfolio</title>
    <style>
        :root {
            --bg: #171a35;
            --panel: #1d2346;
            --panel-2: #1d3a56;
            --panel-3: #13182d;
            --line: rgba(24, 215, 255, 0.08);
            --cyan: #22d4ff;
            --green: #20ef7a;
            --red: #ff5b7c;
            --text: #f7fbff;
            --muted: rgba(225, 233, 255, 0.56);
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "SF Pro Display", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(29, 58, 86, 0.4), transparent 34%),
                linear-gradient(180deg, #171932 0%, #1c2147 100%);
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 28px 18px 42px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 22px;
        }

        .topbar-title {
            margin: 0;
            color: #22f0dc;
            font-size: clamp(2.2rem, 8vw, 3.4rem);
            font-weight: 600;
            letter-spacing: -0.05em;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .topbar-btn {
            border: 0;
            border-radius: 18px;
            background: linear-gradient(135deg, #30dbff 0%, #1db5f2 100%);
            color: rgba(255, 255, 255, 0.94);
            box-shadow: 0 10px 24px rgba(24, 176, 236, 0.28);
            cursor: pointer;
            font-size: 1rem;
            min-height: 56px;
            padding: 0 22px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .topbar-btn--icon {
            width: 56px;
            min-width: 56px;
            padding: 0;
            font-size: 1.45rem;
        }

        .hero {
            background: linear-gradient(135deg, #1f3c5b 0%, #1f3a56 100%);
            border-radius: 32px;
            padding: 34px 28px;
            box-shadow: var(--shadow);
        }

        .hero-total {
            margin: 0;
            font-size: clamp(3.2rem, 11vw, 5.25rem);
            line-height: 0.95;
            font-weight: 700;
            letter-spacing: -0.06em;
        }

        .hero-gain {
            margin-top: 18px;
            font-size: clamp(1.45rem, 5vw, 2.2rem);
            color: var(--green);
            letter-spacing: -0.03em;
        }

        .form-panel {
            margin-top: 26px;
            background: rgba(28, 34, 71, 0.9);
            border-radius: 28px;
            padding: 26px 22px 24px;
            box-shadow: var(--shadow);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px 24px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field label {
            font-size: 0.95rem;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        .field input {
            width: 100%;
            border: 1px solid rgba(0, 204, 255, 0.14);
            border-radius: 16px;
            background: var(--panel-3);
            color: var(--text);
            font-size: 1.1rem;
            padding: 18px 16px;
            outline: none;
        }

        .field input:focus {
            border-color: rgba(34, 212, 255, 0.4);
            box-shadow: 0 0 0 3px rgba(34, 212, 255, 0.08);
        }

        .form-actions {
            display: flex;
            align-items: end;
            gap: 16px;
        }

        .submit-btn {
            min-width: 152px;
            height: 62px;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, #15f484 0%, #0fe7aa 100%);
            color: #ffffff;
            font-size: 1.35rem;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(21, 244, 132, 0.2);
        }

        .status {
            margin-top: 14px;
            min-height: 20px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .status.error {
            color: #ff96ad;
        }

        .table-card {
            margin-top: 34px;
            background: rgba(28, 34, 71, 0.92);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 940px;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(90deg, #1d3b58 0%, #1f3f5d 100%);
        }

        th {
            padding: 22px 20px;
            text-align: left;
            color: var(--cyan);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        th.sortable::after {
            content: "▼";
            margin-left: 7px;
            font-size: 0.75em;
            opacity: 0.36;
        }

        .label-short {
            display: none;
        }

        th.active-sort::after {
            opacity: 0.95;
        }

        th.active-sort.desc::after {
            content: "▲";
        }

        td {
            padding: 24px 20px;
            border-bottom: 1px solid var(--line);
            font-size: 1rem;
            color: rgba(245, 248, 255, 0.88);
            white-space: nowrap;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .sym {
            color: var(--cyan);
            font-weight: 700;
            font-size: 1.12rem;
            letter-spacing: 0.03em;
        }

        .mono {
            font-variant-numeric: tabular-nums;
        }

        .up {
            color: var(--green);
        }

        .down {
            color: var(--red);
        }

        .muted {
            color: var(--muted);
        }

        .row-actions {
            text-align: right;
        }

        .delete-btn {
            border: 1px solid rgba(255, 91, 124, 0.22);
            background: rgba(255, 91, 124, 0.08);
            color: #ff8aa2;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.92rem;
            cursor: pointer;
        }

        @media (max-width: 720px) {
            .page {
                padding: 18px 12px 28px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar-actions {
                width: 100%;
                justify-content: flex-start;
                gap: 12px;
            }

            .hero {
                border-radius: 26px;
                padding: 28px 20px;
            }

            .form-panel {
                border-radius: 24px;
                padding: 22px 16px 18px;
            }

            .form-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 16px;
            }

            .field--symbol {
                grid-column: span 2;
            }

            .field--cost {
                grid-column: span 2;
            }

            .form-actions {
                grid-column: span 2;
            }

            .submit-btn {
                flex: 1;
                width: 100%;
            }

            .table-card {
                border-radius: 22px;
            }

            .table-wrap {
                overflow-x: hidden;
            }

            table {
                min-width: 100%;
                table-layout: fixed;
            }

            th {
                padding: 14px 1px;
                font-size: 0.74rem;
                letter-spacing: 0;
            }

            th.sortable::after {
                margin-left: 2px;
            }

            td {
                padding: 15px 1px;
                font-size: 0.8rem;
            }

            .label-full {
                display: none;
            }

            .label-short {
                display: inline;
            }

            .sym {
                font-size: 0.9rem;
            }

            .delete-btn {
                padding: 8px 6px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <h1 class="topbar-title">SIM</h1>
            <div class="topbar-actions">
                <button class="topbar-btn topbar-btn--icon" id="refresh-btn" type="button" aria-label="Refresh">↻</button>
                <button class="topbar-btn" id="excel-btn" type="button">Excel</button>
                <a class="topbar-btn" href="/">返回主頁</a>
            </div>
        </div>

        <section class="hero">
            <h1 class="hero-total mono" id="portfolio-total">$0</h1>
            <div class="hero-gain mono" id="portfolio-gain">$0 (0%)</div>
        </section>

        <section class="form-panel">
            <form id="sim-form">
                <div class="form-grid">
                    <div class="field field--symbol">
                        <label for="symbol">股票代碼</label>
                        <input id="symbol" name="symbol" type="text" autocomplete="off" placeholder="AAPL" required>
                    </div>
                    <div class="field">
                        <label for="shares">股數</label>
                        <input id="shares" name="shares" type="number" step="0.01" min="0" placeholder="100" required>
                    </div>
                    <div class="field field--cost">
                        <label for="cost">成本價</label>
                        <input id="cost" name="cost" type="number" step="0.01" min="0" placeholder="150.00" required>
                    </div>
                    <div class="field">
                        <label for="buy_date">日期</label>
                        <input id="buy_date" name="buy_date" type="text" placeholder="Jun05" required>
                    </div>
                    <div class="form-actions">
                        <button class="submit-btn" type="submit">新增</button>
                    </div>
                </div>
            </form>
            <div class="status" id="status"></div>
        </section>

        <section class="table-card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th class="sortable active-sort" data-sort="symbol"><span class="label-full">Sym</span><span class="label-short">S</span></th>
                            <th class="sortable" data-sort="shares"><span class="label-full">Shares</span><span class="label-short">Sh</span></th>
                            <th class="sortable" data-sort="cost"><span class="label-full">Cost</span><span class="label-short">C</span></th>
                            <th class="sortable" data-sort="price"><span class="label-full">Price</span><span class="label-short">P</span></th>
                            <th class="sortable" data-sort="chg_percent"><span class="label-full">Chg%</span><span class="label-short">Chg</span></th>
                            <th class="sortable" data-sort="value"><span class="label-full">Value</span><span class="label-short">Val</span></th>
                            <th class="sortable" data-sort="gain"><span class="label-full">Gain</span><span class="label-short">G</span></th>
                            <th class="sortable" data-sort="gain_percent"><span class="label-full">Gain%</span><span class="label-short">G%</span></th>
                            <th class="sortable" data-sort="buy_date"><span class="label-full">Buy Date</span><span class="label-short">Dt</span></th>
                            <th><span class="label-full">Action</span><span class="label-short">X</span></th>
                        </tr>
                    </thead>
                    <tbody id="positions-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const positionsBody = document.getElementById('positions-body');
        const statusEl = document.getElementById('status');
        const totalEl = document.getElementById('portfolio-total');
        const gainEl = document.getElementById('portfolio-gain');
        const formEl = document.getElementById('sim-form');
        const sortHeaders = Array.from(document.querySelectorAll('th.sortable'));
        const refreshBtn = document.getElementById('refresh-btn');
        const excelBtn = document.getElementById('excel-btn');

        let rows = [];
        let sortState = { key: 'symbol', direction: 'asc' };

        function formatMoney(value, digits = 0) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: digits,
                maximumFractionDigits: digits
            }).format(value);
        }

        function formatMoneyFlexible(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        function formatPercent(value, digits = 0) {
            const sign = value > 0 ? '+' : '';
            return `${sign}${value.toFixed(digits)}%`;
        }

        function numberOrNull(value) {
            return Number.isFinite(value) ? value : null;
        }

        function parseDateToken(value) {
            if (!value) return Number.NEGATIVE_INFINITY;
            const match = String(value).trim().match(/^([A-Za-z]{3})(\d{2})$/);
            if (!match) return String(value).toUpperCase();
            const months = {
                JAN: 0, FEB: 1, MAR: 2, APR: 3, MAY: 4, JUN: 5,
                JUL: 6, AUG: 7, SEP: 8, OCT: 9, NOV: 10, DEC: 11
            };
            const month = months[match[1].toUpperCase()];
            if (month == null) return String(value).toUpperCase();
            return new Date(2026, month, Number(match[2])).getTime();
        }

        function compareValues(a, b, key) {
            if (key === 'symbol' || key === 'buy_date') {
                const left = key === 'buy_date' ? parseDateToken(a[key]) : String(a[key] || '').toUpperCase();
                const right = key === 'buy_date' ? parseDateToken(b[key]) : String(b[key] || '').toUpperCase();
                if (left < right) return -1;
                if (left > right) return 1;
                return 0;
            }

            const left = a[key];
            const right = b[key];
            const leftMissing = left == null || Number.isNaN(left);
            const rightMissing = right == null || Number.isNaN(right);
            if (leftMissing && rightMissing) return 0;
            if (leftMissing) return 1;
            if (rightMissing) return -1;
            return left - right;
        }

        function applySort(nextKey) {
            if (nextKey) {
                if (sortState.key === nextKey) {
                    sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    sortState = { key: nextKey, direction: 'asc' };
                }
            }

            rows.sort((a, b) => {
                const result = compareValues(a, b, sortState.key);
                return sortState.direction === 'asc' ? result : -result;
            });

            sortHeaders.forEach((header) => {
                const active = header.dataset.sort === sortState.key;
                header.classList.toggle('active-sort', active);
                header.classList.toggle('desc', active && sortState.direction === 'desc');
            });
        }

        function updateSummary() {
            let totalValue = 0;
            let totalCost = 0;
            let totalGain = 0;

            rows.forEach((row) => {
                totalValue += row.value_for_total;
                totalCost += row.cost_basis;
                totalGain += row.gain_for_total;
            });

            const gainPct = totalCost > 0 ? (totalGain / totalCost) * 100 : 0;
            totalEl.textContent = formatMoney(totalValue, 0);
            gainEl.textContent = `${totalGain >= 0 ? '+' : '-'}${formatMoney(Math.abs(totalGain), 0)} (${totalGain >= 0 ? '+' : '-'}${Math.abs(gainPct).toFixed(0)}%)`;
            gainEl.className = `hero-gain mono ${totalGain >= 0 ? 'up' : 'down'}`;
        }

        function renderTable() {
            positionsBody.innerHTML = rows.map((row) => {
                const chgClass = row.chg_percent == null ? 'muted' : row.chg_percent >= 0 ? 'up' : 'down';
                const gainClass = row.gain == null ? 'muted' : row.gain >= 0 ? 'up' : 'down';
                const gainPctClass = row.gain_percent == null ? 'muted' : row.gain_percent >= 0 ? 'up' : 'down';
                const priceText = row.price == null ? '-' : formatMoneyFlexible(row.price);
                const chgText = row.chg_percent == null ? '-' : formatPercent(row.chg_percent, 0);
                const valueText = row.value == null ? '-' : formatMoney(row.value, 0);
                const gainText = row.gain == null ? '-' : `${row.gain >= 0 ? '+' : '-'}${formatMoney(Math.abs(row.gain), 0)}`;
                const gainPctText = row.gain_percent == null ? '-' : formatPercent(row.gain_percent, 0);

                return `
                    <tr>
                        <td class="sym">${row.symbol}</td>
                        <td class="mono">${row.shares % 1 === 0 ? row.shares.toFixed(0) : row.shares.toFixed(2)}</td>
                        <td class="mono">${formatMoneyFlexible(row.cost)}</td>
                        <td class="mono">${priceText}</td>
                        <td class="mono ${chgClass}">${chgText}</td>
                        <td class="mono">${valueText}</td>
                        <td class="mono ${gainClass}">${gainText}</td>
                        <td class="mono ${gainPctClass}">${gainPctText}</td>
                        <td class="mono">${row.buy_date || '-'}</td>
                        <td class="row-actions"><button class="delete-btn" data-symbol="${row.symbol}">Delete</button></td>
                    </tr>
                `;
            }).join('');

            document.querySelectorAll('.delete-btn').forEach((button) => {
                button.addEventListener('click', async () => {
                    const symbol = button.dataset.symbol;
                    if (!confirm(`Delete ${symbol}?`)) return;
                    try {
                        const response = await fetch(`/api/sim/positions/${encodeURIComponent(symbol)}`, {
                            method: 'DELETE'
                        });
                        const data = await response.json();
                        if (!response.ok) {
                            throw new Error(data.error || 'Delete failed');
                        }
                        setStatus(`${symbol} deleted`);
                        await loadPositions();
                    } catch (error) {
                        setStatus(error.message, true);
                    }
                });
            });
        }

        function setStatus(message, isError = false) {
            statusEl.textContent = message || '';
            statusEl.className = isError ? 'status error' : 'status';
        }

        function exportExcel() {
            const headers = ['Symbol', 'Shares', 'Cost', 'Price', 'Chg%', 'Value', 'Gain', 'Gain%', 'Buy Date'];
            const csvRows = [headers.join(',')];

            rows.forEach((row) => {
                csvRows.push([
                    row.symbol,
                    row.shares,
                    row.cost,
                    row.price ?? '',
                    row.chg_percent ?? '',
                    row.value ?? '',
                    row.gain ?? '',
                    row.gain_percent ?? '',
                    row.buy_date || ''
                ].join(','));
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const stamp = new Date().toISOString().slice(0, 10);
            link.href = url;
            link.download = `sim-portfolio-${stamp}.csv`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            setStatus('Excel download started');
        }

        async function fetchPrice(symbol) {
            try {
                const response = await fetch(`/api/sim/price/${encodeURIComponent(symbol)}`);
                if (!response.ok) {
                    return { price: null, change_percent: null };
                }
                return await response.json();
            } catch (error) {
                return { price: null, change_percent: null };
            }
        }

        async function loadPositions() {
            setStatus('Loading...');
            const response = await fetch('/api/sim/positions');
            const baseRows = await response.json();

            const enriched = await Promise.all(baseRows.map(async (position) => {
                const live = await fetchPrice(position.symbol);
                const price = numberOrNull(live.price);
                const shares = Number(position.shares || 0);
                const cost = Number(position.cost || 0);
                const costBasis = shares * cost;
                const value = price == null ? null : shares * price;
                const gain = value == null ? null : value - costBasis;
                const gainPercent = gain == null || costBasis <= 0 ? null : (gain / costBasis) * 100;
                return {
                    ...position,
                    shares,
                    cost,
                    price,
                    chg_percent: numberOrNull(live.change_percent),
                    cost_basis: costBasis,
                    value,
                    gain,
                    gain_percent: gainPercent,
                    value_for_total: value == null ? costBasis : value,
                    gain_for_total: gain == null ? 0 : gain
                };
            }));

            rows = enriched;
            applySort();
            updateSummary();
            renderTable();
            setStatus('');
        }

        formEl.addEventListener('submit', async (event) => {
            event.preventDefault();
            const payload = {
                symbol: document.getElementById('symbol').value.trim().toUpperCase(),
                shares: Number(document.getElementById('shares').value),
                cost: Number(document.getElementById('cost').value),
                buy_date: document.getElementById('buy_date').value.trim()
            };

            try {
                const response = await fetch('/api/sim/positions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Save failed');
                }
                formEl.reset();
                setStatus(`${payload.symbol} saved`);
                await loadPositions();
            } catch (error) {
                setStatus(error.message, true);
            }
        });

        sortHeaders.forEach((header) => {
            header.addEventListener('click', () => {
                applySort(header.dataset.sort);
                renderTable();
            });
        });

        refreshBtn.addEventListener('click', async () => {
            await loadPositions();
            setStatus('Portfolio refreshed');
        });

        excelBtn.addEventListener('click', exportExcel);

        loadPositions();
    </script>
</body>
</html>
